<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Chaîne de l'atelier</title>
  <desc id="desc">Vue d'ensemble du nœud capteur vers la passerelle puis le tableau de bord de la classe.</desc>
  <style>
    .bg { fill: #fcfaf4; }
    .box { fill: #ffffff; stroke: #cfc5b3; stroke-width: 2; rx: 18; }
    .title { font: 700 24px Georgia, serif; fill: #1f2430; }
    .label { font: 600 18px sans-serif; fill: #1f2430; }
    .text { font: 15px sans-serif; fill: #4b5563; }
    .arrow { stroke: #0b6e4f; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    .small { font: 700 14px sans-serif; fill: #0b6e4f; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#0b6e4f" />
    </marker>
  </defs>
  <rect class="bg" width="960" height="300" rx="24" />
  <text class="title" x="40" y="42">De la cour au tableau de bord</text>
  <rect class="box" x="40" y="90" width="240" height="150" />
  <text class="label" x="70" y="130">Nœud capteur</text>
  <text class="text" x="70" y="160">Mesure la lumière nocturne</text>
  <text class="text" x="70" y="185">TSL2591 + radio SX1262</text>
  <text class="text" x="70" y="210">Préparé avant la séance</text>
  <rect class="box" x="360" y="90" width="240" height="150" />
  <text class="label" x="390" y="130">Passerelle</text>
  <text class="text" x="390" y="160">HAT SX1303 sur l'hôte</text>
  <text class="text" x="390" y="185">Reçoit le trafic radio</text>
  <text class="text" x="390" y="210">Alimente la pile logicielle</text>
  <rect class="box" x="680" y="90" width="240" height="150" />
  <text class="label" x="710" y="130">Tableau de bord</text>
  <text class="text" x="710" y="160">Carte Home Assistant</text>
  <text class="text" x="710" y="185">Historique InfluxDB</text>
  <text class="text" x="710" y="210">Comparer les lieux</text>
  <path class="arrow" d="M280 165 H340" />
  <path class="arrow" d="M600 165 H660" />
  <text class="small" x="292" y="152">Radio EU868</text>
  <text class="small" x="616" y="152">MQTT + historique</text>
</svg>
