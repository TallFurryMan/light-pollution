<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 320" role="img" aria-labelledby="title desc">
  <title id="title">Software stack</title>
  <desc id="desc">Current project stack from sensor node to history database.</desc>
  <style>
    .bg { fill: #fffdf8; }
    .box { fill: #ffffff; stroke: #d6ccbb; stroke-width: 2; rx: 18; }
    .title { font: 700 24px Georgia, serif; fill: #1f2430; }
    .label { font: 700 17px sans-serif; fill: #1f2430; }
    .text { font: 14px sans-serif; fill: #4b5563; }
    .arrow { stroke: #0b6e4f; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    .small { font: 700 13px sans-serif; fill: #0b6e4f; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#0b6e4f" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="320" rx="24" />
  <text class="title" x="40" y="42">Current repository stack</text>
  <rect class="box" x="40" y="110" width="140" height="120" />
  <text class="label" x="68" y="150">Node</text>
  <text class="text" x="68" y="175">Pico + SX1262</text>
  <text class="text" x="68" y="198">TSL2591</text>
  <rect class="box" x="220" y="110" width="180" height="120" />
  <text class="label" x="248" y="150">Gateway hat</text>
  <text class="text" x="248" y="175">SX1303 on host</text>
  <text class="text" x="248" y="198">EU868</text>
  <rect class="box" x="440" y="110" width="180" height="120" />
  <text class="label" x="470" y="150">ChirpStack</text>
  <text class="text" x="470" y="175">Radio network layer</text>
  <text class="text" x="470" y="198">Gateway bridge</text>
  <rect class="box" x="660" y="110" width="140" height="120" />
  <text class="label" x="695" y="150">MQTT</text>
  <text class="text" x="695" y="175">Mosquitto</text>
  <text class="text" x="695" y="198">Topics</text>
  <rect class="box" x="840" y="70" width="220" height="80" />
  <text class="label" x="875" y="110">Home Assistant</text>
  <text class="text" x="875" y="132">Map, entities, classroom UI</text>
  <rect class="box" x="840" y="170" width="220" height="80" />
  <text class="label" x="905" y="210">InfluxDB</text>
  <text class="text" x="875" y="232">Long-term measurement history</text>
  <path class="arrow" d="M180 170 H210" />
  <path class="arrow" d="M400 170 H430" />
  <path class="arrow" d="M620 170 H650" />
  <path class="arrow" d="M800 130 H830" />
  <path class="arrow" d="M800 210 H830" />
  <text class="small" x="184" y="155">radio</text>
  <text class="small" x="412" y="155">network</text>
  <text class="small" x="625" y="155">MQTT</text>
</svg>
