---
# Home Assistant configuration for InfluxDB integration
# This file is mapped into the Home Assistant container at /config/configuration.yaml

# Enable the integration
homeassistant:
  name: HomeAssistant
  latitude: 48.2175823
  longitude: -1.6962403
  elevation: 0
  unit_system: metric
  time_zone: Europe/Paris
  country: FR

# InfluxDB 2.x history exporter.
#
# Home Assistant imports this YAML configuration as a config entry at startup,
# which keeps the classroom stack ready without extra UI setup.
influxdb:
  api_version: 2
  ssl: false
  host: influxdb
  port: 8086
  token: "ha-dev-token"
  organization: "homeassistant"
  bucket: "homeassistant"

# MQTT is preseeded via core.config_entries in src/config-seed.
